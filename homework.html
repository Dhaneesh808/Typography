<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        *{
            background-color:burlywood;
        }
        #mydiv{
            font-family: monospace;
            font-weight: 900;
            font-size: 20px;
            color:blue
        }
        #wediv{
            width: 300px;
            height: 200px;
            background-color:yellow;
            border: 4px solid;
            font-size: 20px;
            font-weight: 980;
            transform:rotateY(180deg)
        }
        h1{
            text-decoration:underline;
            text-transform:none
        }
        #h2{
            text-transform:uppercase;
            text-decoration:line-through;
            font-size: 20px;            
        }
        h3{
            text-transform:uppercase;
            text-decoration: overline;
        }
        h4{
            text-transform: uppercase;
            text-decoration: underline overline;
        }
        #text{
            text-shadow: 2px 2px 1px blue;
            /* (right-offset)px (left-offset)px (fade)px color*/
        }
        #box{
            box-shadow: 9px 9px 5px red;
            background-color:beige
            /* (right-offset)px (left-offside)px (fade)px color*/
             
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>We will learn about text styles</h2>
    <div id="mydiv">This is how you will change your font style, weight, size and color</div>
    <div id="wediv">We can flip by transforming it</div>
    <h1>Coding is the best</h1>
    <div id="h2">Coding is the best</div>
    <h3>Coding is the best</h3>
    <h4>Coding is the best</h4>
    <h1 id="text">We like to code</h1>
    <h1 id="box">We like to code</h1>
</body>
</html>
